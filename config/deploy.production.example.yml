# Local production overlay — copy to deploy.production.yml (gitignored) and edit.
#
#   cp config/deploy.production.example.yml config/deploy.production.yml
#
# Deploy:
#   export KAMAL_REGISTRY_PASSWORD=ghp_...
#   export POSTGRES_PASSWORD=...
#   export DEEPSEEK_API_KEY=sk_...
#   export SIDEKIQ_WEB_USER=admin
#   export SIDEKIQ_WEB_PASSWORD=$(openssl rand -base64 24)
#   bin/kamal deploy -d production
#
# Secrets: .kamal/secrets-common (+ optional .kamal/secrets.production)

servers:
  web:
    - YOUR_SERVER_IP
  job:
    hosts:
      - YOUR_SERVER_IP

builder:
  remote: ssh://root@YOUR_SERVER_IP

ssh:
  user: root
  keys:
    - ~/.ssh/id_ed25519
  keys_only: true

accessories:
  db:
    host: YOUR_SERVER_IP
    image: postgres:18
    port: "127.0.0.1:5432:5432"
    env:
      clear:
        POSTGRES_USER: analisehumornoticias
        POSTGRES_DB: analisehumornoticias_production
      secret:
        - POSTGRES_PASSWORD
    directories:
      - data:/var/lib/postgresql

  redis:
    host: YOUR_SERVER_IP
    image: valkey/valkey:8
    port: "127.0.0.1:6379:6379"
    directories:
      - data:/data
