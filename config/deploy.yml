service: analisehumornoticias

# ghcr.io/deaballe/analisehumornoticias
image: deaballe/analisehumornoticias

# Server IPs, SSH and builder.remote: config/deploy.production.yml (local, not committed)
# Copy config/deploy.production.example.yml and fill in your values.

servers:
  job:
    cmd: bundle exec sidekiq -C config/sidekiq.yml

proxy:
  host: labs.andreaballe.com
  path_prefix: /analise-humor-noticias
  forward_headers: true
  healthcheck:
    path: /up

registry:
  server: ghcr.io
  username: deaballe
  password:
    - KAMAL_REGISTRY_PASSWORD

env:
  secret:
    - RAILS_MASTER_KEY
    - DATABASE_URL
    - REDIS_URL
    - DEEPSEEK_API_KEY
  clear:
    RAILS_RELATIVE_URL_ROOT: /analise-humor-noticias
    DEEPSEEK_BASE_URL: https://api.deepseek.com
    DEEPSEEK_MODEL: deepseek-chat

aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f
  dbc: app exec --interactive --reuse "bin/rails dbconsole --include-password"

volumes:
  - "analisehumornoticias_storage:/rails/storage"

asset_path: /rails/public/assets

builder:
  arch: amd64
  context: .

accessories:
  db:
    image: postgres:18
    port: "127.0.0.1:5432:5432"
    env:
      clear:
        POSTGRES_USER: analisehumornoticias
        POSTGRES_DB: analisehumornoticias_production
      secret:
        - POSTGRES_PASSWORD
    directories:
      - data:/var/lib/postgresql

  redis:
    image: valkey/valkey:8
    port: "127.0.0.1:6379:6379"
    directories:
      - data:/data
